name: TripDataHub
options:
  minimumXcodeGenVersion: 2.44.0
settings:
  base:
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
  configs:
    Debug:
      ENABLE_TESTABILITY: YES
targets:
  TripDataHub:
    type: application
    platform: iOS
    sources:
      - path: TripDataHub
        excludes:
          - "**/*.md"
    resources:
      - path: TripDataHub/Resources/AdminPolicy.json
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sfune.BidProSchedule
        PRODUCT_NAME: "TripData Hub"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: TripDataHub/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        INFOPLIST_KEY_CFBundleDisplayName: TripData Hub
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        INFOPLIST_KEY_UIAppFonts:
          - MaterialIcons.ttf
          - Resources/Fonts/MaterialIcons.ttf
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: NO
        INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
    scheme:
      testTargets:
        - TripDataHubTests

  TripDataHubTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - TripDataHubTests
    dependencies:
      - target: TripDataHub
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sfune.BidProSchedule.Tests
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: YES
        # Hardcoded to match PRODUCT_NAME "TripData Hub". If PRODUCT_NAME changes, update this path.
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/TripData Hub.app/TripData Hub"
        BUNDLE_LOADER: $(TEST_HOST)
